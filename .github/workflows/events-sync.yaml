name: Sync events from Google Sheet

on:
  schedule:
    - cron: "17 * * * *" # hourly
  workflow_dispatch:

permissions:
  contents: write
  actions: write # needed to trigger the deploy workflow below

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync events.json from the sheet
        run: python3 scripts/sync_events.py

      - name: Commit if changed
        id: commit
        run: |
          git config user.name "nycma-bot"
          git config user.email "bot@nycmacadmins.com"
          git add data/events.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Sync events from sheet"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # A push made with the default GITHUB_TOKEN does NOT trigger other
      # workflows (GitHub's loop-prevention) — so deploy.yaml's `on: push`
      # never fires for this bot's commits. Trigger it explicitly instead.
      - name: Trigger site deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yaml --repo "${{ github.repository }}" --ref main
