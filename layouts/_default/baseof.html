<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}NYC Mac Admins — Community Meetup for Apple Admins in New York{{ else }}{{ .Title }} · NYC Mac Admins{{ end }}</title>
  <meta name="description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <link rel="canonical" href="{{ .Permalink }}">

  <meta property="og:title" content="{{ if .IsHome }}NYC Mac Admins — Community Meetup for Apple Admins in New York{{ else }}{{ .Title }} · NYC Mac Admins{{ end }}">
  <meta property="og:description" content="{{ if .Description }}{{ .Description }}{{ else }}{{ .Site.Params.description }}{{ end }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:image" content="{{ "images/og-image.png" | absURL }}">
  <meta name="twitter:card" content="summary_large_image">

  <link rel="icon" type="image/svg+xml" href="{{ "images/favicon.svg" | relURL }}">
  <link rel="apple-touch-icon" href="{{ "images/apple-touch-icon.png" | relURL }}">

  {{ with .Site.GetPage "/events" }}
  <link rel="alternate" type="application/rss+xml" title="NYC Mac Admins Events" href="{{ .Permalink }}index.xml">
  {{ end }}

  <link rel="preload" href="{{ "fonts/oswald-var.woff2" | relURL }}" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="{{ "fonts/lato-regular.woff2" | relURL }}" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="{{ "css/main.css" | relURL }}">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  {{ partial "header.html" . }}

  <main id="main">
    {{ block "main" . }}{{ end }}
  </main>

  {{ partial "footer.html" . }}

  <script src="{{ "js/main.js" | relURL }}"></script>
</body>
</html>
